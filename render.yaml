services:
  - type: web
    name: vera-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false        # set this in Render dashboard — never commit the key
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: TEAM_NAME
        value: Vera++
      - key: TEAM_MEMBER
        value: Hammad
